services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: theater_planner
    volumes:
      - theater_planner_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d theater_planner"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  theater_planner_pg:
